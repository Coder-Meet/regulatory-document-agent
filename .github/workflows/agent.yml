name: Document Agent

# Serverless hosting: pulls requests from Gmail over IMAP (no public server needed).
#
# GitHub's scheduled cron is unreliable on the free tier (often ~1x/hour, not every
# 5 min). So each run polls for 10 minutes, then immediately queues the next run.
# That keeps the inbox checked continuously without waiting on cron.

on:
  schedule:
    - cron: "*/5 * * * *"     # backup trigger if the chain ever stops
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  actions: write   # needed to queue the next poll run
  contents: read

concurrency:
  group: document-agent
  cancel-in-progress: false

jobs:
  poll-inbox:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run agent (poll every 30s for 10 minutes)
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          AGENT_ADDRESS: ${{ secrets.AGENT_ADDRESS }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          IMAP_HOST: imap.gmail.com
          IMAP_PORT: "993"
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          MAILBOX: INBOX
          MAX_EMAILS_TO_SCAN: "25"
          MAX_ATTACHMENT_MB: "25"
          OPENROUTER_MODEL: openai/gpt-4o-mini
          HEADLESS: "true"
        run: python agent.py --loop --interval 30 --max-runtime 600

      - name: Queue next poll (keeps inbox checked continuously)
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run agent.yml
